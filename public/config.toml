[app]
default_provider = "opencode"
theme = "dark"

[[providers]]
id = "opencode"
type = "http"
command = "opencode"
args = [
    "serve",
    "--hostname",
    "127.0.0.1",
    "--port",
    "4096",
]
config_path = "~/.config/opencode/opencode.json"
health_cmd = []

[[providers]]
id = "codewhale"
type = "http"
command = "codewhale"
args = [
    "serve",
    "--http",
    "--port",
    "7878",
    "--insecure",
]
config_path = "~/.codewhale/config.toml"
health_cmd = [
    "codewhale",
    "doctor",
    "--json",
]
